name: "Release"

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v7"
        with:
          # Full history + tags, not just the tagged commit -- the changelog
          # script below needs to walk commits back to the previous tag.
          fetch-depth: 0

      - name: "Adjust version number"
        shell: "bash"
        run: |
          version="${GITHUB_REF_NAME#v}"
          yq -i -o json ".version=\"${version}\"" \
            "${GITHUB_WORKSPACE}/custom_components/nearby_flights/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${GITHUB_WORKSPACE}/custom_components/nearby_flights"
          zip nearby_flights.zip -r ./

      - name: "Build the changelog"
        shell: "bash"
        run: python3 "${GITHUB_WORKSPACE}/.github/scripts/build_changelog.py" > "${GITHUB_WORKSPACE}/changelog.md"

      - name: "Create the release and upload the ZIP file"
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/custom_components/nearby_flights/nearby_flights.zip
          body_path: ${{ github.workspace }}/changelog.md
