
---
name: Validate with hassfest

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v7
        name: Download repo
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        name: Setup Python
        with:
          python-version: '3.13'
      - uses: home-assistant/actions/hassfest@master
